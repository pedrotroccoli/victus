services:
  # ── Dev profile ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: victus-mongodb
    profiles: [dev]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - victus-network

  web:
    build:
      context: ./victus-ruby-server
      dockerfile: Dockerfile
    container_name: victus-api
    profiles: [dev]
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - victus-network

  caddy:
    image: caddy:2
    container_name: victus-caddy
    profiles: [dev]
    ports:
      - "443:443"
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./victus-web-app/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - victus-network

  # ── Prod profile ─────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    profiles: [prod]
    environment:
      - DOCKER_API_VERSION: "1.47"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - victus-network

  victus-server:
    image: victus-ruby-server:latest
    container_name: victus-api-prod
    profiles: [prod]
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.victus-api.rule=Host(`${VICTUS_SERVER_DOMAIN}`)"
      - "traefik.http.routers.victus-api.entrypoints=websecure"
      - "traefik.http.routers.victus-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.victus-api.loadbalancer.server.port=3000"
      - "traefik.http.routers.victus-api-http.rule=Host(`${VICTUS_SERVER_DOMAIN}`)"
      - "traefik.http.routers.victus-api-http.entrypoints=web"
      - "traefik.http.routers.victus-api-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    restart: unless-stopped
    networks:
      - victus-network

volumes:
  mongodb_data:
  mongodb_config:
  letsencrypt:
  caddy_data:
  caddy_config:

networks:
  victus-network:
    driver: bridge
