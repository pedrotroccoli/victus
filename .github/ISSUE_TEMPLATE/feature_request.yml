name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature do you want?
      placeholder: A clear description of the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: features
    attributes:
      label: Proposed Features
      description: List the key capabilities
      placeholder: |
        - Feature A
        - Feature B
        - Feature C
    validations:
      required: true
  - type: dropdown
    id: project
    attributes:
      label: Project
      multiple: true
      options:
        - victus-web-app (frontend)
        - victus-ruby-server (backend)
        - victus-home (landing page)
        - victus-infra
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, references, related issues, etc.
