---
openapi: 3.0.1
info:
  title: Victus API V1
  version: v1
  description: Personal assistant and all-in-one organizer API
  contact:
    name: Victus Team
paths:
  "/api/v1/stripe/webhook":
    post:
      summary: Handle Stripe webhook events
      tags:
      - Webhooks
      description: |
        Webhook endpoint for Stripe events. Requires valid Stripe signature.

        Handled events:
        - customer.subscription.created
        - customer.subscription.updated
        - customer.subscription.deleted
        - invoice.paid
        - invoice.payment_failed
      parameters:
      - name: Stripe-Signature
        in: header
        required: true
        description: Stripe webhook signature for verification
        schema:
          type: string
      responses:
        '201':
          description: Event processed
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid payload or signature
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/habits_category":
    get:
      summary: List all categories
      tags:
      - Categories
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/habit_category"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    post:
      summary: Create a category
      tags:
      - Categories
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit_category"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - habits_category
              properties:
                habits_category:
                  type: object
                  properties:
                    name:
                      type: string
                    order:
                      type: number
                    icon:
                      type: string
                  required:
                  - name
  "/api/v1/habits_category/{id}":
    parameters:
    - name: id
      in: path
      description: Category ID
      required: true
      schema:
        type: string
    put:
      summary: Update a category
      tags:
      - Categories
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit_category"
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - habits_category
              properties:
                habits_category:
                  type: object
                  properties:
                    name:
                      type: string
                    order:
                      type: number
                    icon:
                      type: string
    delete:
      summary: Delete a category
      tags:
      - Categories
      security:
      - bearer_auth: []
      responses:
        '204':
          description: Category deleted
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/checks":
    get:
      summary: List all habit checks for account
      tags:
      - Habit Checks
      security:
      - bearer_auth: []
      parameters:
      - name: start_date
        in: query
        format: date
        required: false
        description: Filter checks from this date
        schema:
          type: string
      - name: end_date
        in: query
        format: date
        required: false
        description: Filter checks until this date
        schema:
          type: string
      responses:
        '200':
          description: All checks
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/habit_check"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/habits/{habit_id}/checks":
    parameters:
    - name: habit_id
      in: path
      description: Habit ID
      required: true
      schema:
        type: string
    get:
      summary: List checks for a specific habit
      tags:
      - Habit Checks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Habit checks list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/habit_check"
    post:
      summary: Create a habit check
      tags:
      - Habit Checks
      security:
      - bearer_auth: []
      description: Record a habit completion. Validates against RRULE schedule and
        rule engine conditions.
      parameters: []
      responses:
        '201':
          description: Check recorded
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit_check"
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                checked:
                  type: boolean
                  description: Whether the habit was completed
                deltas:
                  type: array
                  items:
                    type: object
                    properties:
                      habit_delta_id:
                        type: string
                      value:
                        type: string
  "/api/v1/habits/{habit_id}/checks/{id}":
    parameters:
    - name: habit_id
      in: path
      description: Habit ID
      required: true
      schema:
        type: string
    - name: id
      in: path
      description: Check ID
      required: true
      schema:
        type: string
    get:
      summary: Get a specific check
      tags:
      - Habit Checks
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Check found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit_check"
        '404':
          description: Check not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    put:
      summary: Update a check
      tags:
      - Habit Checks
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Check updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit_check"
        '404':
          description: Check not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                checked:
                  type: boolean
                habit_check_deltas_attributes:
                  type: array
                  items:
                    type: object
                    properties:
                      habit_delta_id:
                        type: string
                      value:
                        type: string
                      _destroy:
                        type: boolean
  "/api/v1/habits":
    get:
      summary: List all habits
      tags:
      - Habits
      security:
      - bearer_auth: []
      parameters:
      - name: category_id
        in: query
        required: false
        description: Filter by category ID
        schema:
          type: string
      responses:
        '200':
          description: Habits list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/habit"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    post:
      summary: Create a habit
      tags:
      - Habits
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: Habit created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: array
                      items:
                        type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - habit
              properties:
                habit:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    start_date:
                      type: string
                      format: date
                    end_date:
                      type: string
                      format: date
                    order:
                      type: number
                    recurrence_type:
                      type: string
                      enum:
                      - daily
                      - weekly
                      - monthly
                      - yearly
                      - infinite
                    recurrence_details:
                      type: object
                      properties:
                        rule:
                          type: string
                          description: RRULE format (e.g., FREQ=DAILY)
                      required:
                      - rule
                    delta_enabled:
                      type: boolean
                    rule_engine_enabled:
                      type: boolean
                    rule_engine_details:
                      type: object
                      nullable: true
                    habit_category_id:
                      type: string
                    parent_habit_id:
                      type: string
                  required:
                  - name
                  - start_date
                  - recurrence_type
                  - recurrence_details
                  - rule_engine_enabled
  "/api/v1/habits/{id}":
    parameters:
    - name: id
      in: path
      description: Habit ID
      required: true
      schema:
        type: string
    get:
      summary: Get a habit
      tags:
      - Habits
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Habit found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit"
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    put:
      summary: Update a habit
      tags:
      - Habits
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Habit updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/habit"
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - habit
              properties:
                habit:
                  type: object
                  properties:
                    name:
                      type: string
                    order:
                      type: number
                    recurrence_type:
                      type: string
                    recurrence_details:
                      type: object
                      properties:
                        rule:
                          type: string
                    habit_category_id:
                      type: string
                    delta_enabled:
                      type: boolean
                    rule_engine_enabled:
                      type: boolean
                    paused:
                      type: boolean
                    finished:
                      type: boolean
    delete:
      summary: Delete a habit
      tags:
      - Habits
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Habit deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Habit not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/me":
    get:
      summary: Get current user profile
      tags:
      - Account
      security:
      - bearer_auth: []
      description: Returns the current user profile. Does not require active subscription.
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  phone:
                    type: string
                    nullable: true
                  connected_providers:
                    type: array
                    items:
                      type: string
                  subscription:
                    "$ref": "#/components/schemas/subscription"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    put:
      summary: Update current user profile
      tags:
      - Account
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  phone:
                    type: string
                    nullable: true
                  connected_providers:
                    type: array
                    items:
                      type: string
                  subscription:
                    "$ref": "#/components/schemas/subscription"
        '402':
          description: No active subscription
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Password mismatch
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - account
              properties:
                account:
                  type: object
                  properties:
                    name:
                      type: string
                    phone:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
  "/api/v1/mood":
    get:
      summary: List all mood entries
      tags:
      - Mood
      security:
      - bearer_auth: []
      parameters:
      - name: start_date
        in: query
        format: date
        required: false
        schema:
          type: string
      - name: end_date
        in: query
        format: date
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Mood entries list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/mood"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    post:
      summary: Record mood
      tags:
      - Mood
      security:
      - bearer_auth: []
      description: Record current mood. Can only be edited within the same hour block.
      parameters: []
      responses:
        '201':
          description: Mood recorded
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/mood"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - mood
              properties:
                mood:
                  type: object
                  properties:
                    value:
                      type: string
                      enum:
                      - terrible
                      - bad
                      - neutral
                      - good
                      - great
                      - amazing
                      description: Mood value
                    description:
                      type: string
                  required:
                  - value
  "/api/v1/mood/{id}":
    parameters:
    - name: id
      in: path
      description: Mood entry ID
      required: true
      schema:
        type: string
    get:
      summary: Get a mood entry
      tags:
      - Mood
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Mood entry found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/mood"
        '404':
          description: Mood not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    put:
      summary: Update a mood entry
      tags:
      - Mood
      security:
      - bearer_auth: []
      description: Update mood. Only allowed within edit window (same hour block and
        date).
      parameters: []
      responses:
        '200':
          description: Mood updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/mood"
        '404':
          description: Mood not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Edit window expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - mood
              properties:
                mood:
                  type: object
                  properties:
                    value:
                      type: string
                      enum:
                      - terrible
                      - bad
                      - neutral
                      - good
                      - great
                      - amazing
                    description:
                      type: string
    delete:
      summary: Delete a mood entry
      tags:
      - Mood
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Mood deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Mood not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/subscription":
    get:
      summary: Get current subscription
      tags:
      - Subscription
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sub_status:
                    type: string
                  service_type:
                    type: string
                  cancel_date:
                    type: string
                    nullable: true
                  cancel_reason:
                    type: string
                    nullable: true
                  current_period_end:
                    type: integer
                    nullable: true
                  cancel_at_period_end:
                    type: boolean
                    nullable: true
                  trial_end:
                    type: integer
                    nullable: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/subscription/cancellation":
    post:
      summary: Cancel subscription
      tags:
      - Subscription
      security:
      - bearer_auth: []
      description: Cancel the current Stripe subscription
      parameters: []
      responses:
        '200':
          description: Subscription canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cancel_at:
                    type: integer
                    nullable: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '402':
          description: No active subscription
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Missing Stripe subscription ID
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                immediate:
                  type: boolean
                  description: Cancel immediately or at period end
                reason:
                  type: string
                  description: Cancellation reason
  "/api/v1/subscription/portal_session":
    post:
      summary: Create Stripe portal session
      tags:
      - Subscription
      security:
      - bearer_auth: []
      description: Create a Stripe billing portal session for subscription management
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_url:
                    type: string
                    format: uri
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '402':
          description: No active subscription
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Missing customer ID
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/plans":
    get:
      summary: List available plans
      tags:
      - Plans
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Plans list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/plan"
  "/api/v1/checkout/create":
    post:
      summary: Create checkout session
      tags:
      - Subscription
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  url:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Missing lookup key
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lookup_key:
                  type: string
                  description: Stripe price lookup key
              required:
              - lookup_key
  "/api/v1/auth/sign-in":
    post:
      summary: Sign in with email and password
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: Signed in successfully
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/auth_response"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - account
  "/api/v1/auth/sign-up":
    post:
      summary: Create a new account
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: Account created with trial subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  message:
                    type: string
                  checkout_url:
                    type: string
                    nullable: true
        '401':
          description: Account already exists or invalid credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 6
                    password_confirmation:
                      type: string
                    name:
                      type: string
                    phone:
                      type: string
                  required:
                  - email
                  - password
                lookup_key:
                  type: string
                  description: Stripe price lookup key for checkout
              required:
              - account
  "/api/v1/auth/start_siwe_auth":
    get:
      summary: Start Sign-In with Ethereum flow
      tags:
      - Authentication
      description: Returns a nonce for SIWE signature verification
      responses:
        '200':
          description: Nonce generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce:
                    type: string
  "/api/v1/auth/siwe_verify":
    post:
      summary: Verify SIWE signature
      tags:
      - Authentication
      description: Verify Ethereum wallet signature and authenticate
      parameters: []
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/auth_response"
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: SIWE payload
                nonce:
                  type: string
                  description: Nonce from start_siwe_auth
              required:
              - payload
              - nonce
  "/api/v1/auth/google_auth":
    post:
      summary: Authenticate with Google
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/auth_response"
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id_token:
                  type: string
                  description: Google ID token
              required:
              - id_token
